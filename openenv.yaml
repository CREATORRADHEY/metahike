name: "CustomerSupportSimulator"
version: "1.0.0"
description: >
  An AI training environment for learning to process customer support tickets.
  The agent must interact with incoming customer emails, route them properly,
  extract important entities like order numbers, and draft policy-compliant
  responses. There are three difficulty levels ranging from simple categorization
  to multi-step response drafting.
tasks:
  - id: "task_categorize_easy"
    description: "Categorize the ticket into 'Billing', 'Tech Support', or 'Refund'."
    difficulty: "easy"
  - id: "task_extract_medium"
    description: "Categorize the ticket and extract the Order ID."
    difficulty: "medium"
  - id: "task_draft_hard"
    description: "Read ticket, lookup policy, and draft a response adhering to the rules."
    difficulty: "hard"
action_schema:
  type: "dict"
  properties:
    action_type:
      type: "string"
      description: "The action to take: 'think', 'lookup_policy', or 'submit'."
    value:
      type: "dict"
      description: "The payload. e.g. for mapping policies: {'topic': 'Refund'}; for submitting: {'category': '...', 'order_id': '...', 'draft': '...'}"
observation_schema:
  type: "dict"
  properties:
    ticket_text:
      type: "string"
    history:
      type: "list"
    metadata:
      type: "dict"
reward_range: [0.0, 1.0]
